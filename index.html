<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunoFlix | Personas & Tracks IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav" id="navbar">
        <div class="nav__logo">SUNOFLIX</div>
    </nav>

    <header class="hero">
        <video muted class="hero__video" id="heroVideo">
            <source src="" type="video/mp4">
        </video>
        <div class="hero__overlay"></div>
        <div class="hero__contents">
            <h1 class="hero__title" id="heroTitle">Carregando...</h1>
            <p class="hero__description" id="heroDesc">Sincronizando sua biblioteca de IA...</p>
            <div class="hero__buttons">
                <button class="hero__button" onclick="document.getElementById('recentesRow').scrollIntoView({behavior:'smooth'})">
                    Explorar
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="row">
            <h2 class="row__title">Últimos Lançamentos (Músicas)</h2>
            <div class="row__posters musicas-feed" id="musicasRecentesRow">
                </div>
        </section>

        <section class="row">
            <h2 class="row__title">Meus Personas</h2>
            <div class="row__navigation">
                <button class="nav-btn prev" id="prevBtn">&#10094;</button>
                <div class="row__posters" id="personasRow"></div>
                <button class="nav-btn next" id="nextBtn">&#10095;</button>
            </div>
        </section>
    </main>

    <div id="personaModal" class="modal">
        <div class="modal__content">
            <span class="modal__close" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
