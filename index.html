<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunoFlix | Galeria de Personas IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav" id="navbar">
        <div class="nav__logo">SUNOFLIX</div>
    </nav>

    <header class="hero">
        <video muted class="hero__video" id="heroVideo">
            <source src="" type="video/mp4">
        </video>
        <div class="hero__overlay"></div>
        <div class="hero__contents">
            <h1 class="hero__title" id="heroTitle">Carregando...</h1>
        </div>
    </header>

    <main class="main-content">
        
        <section class="row">
            <h2 class="row__title">Personagens Atualizados</h2>
            <div class="row__navigation">
                <button class="nav-btn prev" id="prevBtn" aria-label="Anterior">&#10094;</button>
                
                <div class="row__posters" id="personasRow">
                    </div>
                
                <button class="nav-btn next" id="nextBtn" aria-label="Próximo">&#10095;</button>
            </div>
        </section>

        <section class="row">
            <h2 class="row__title">Últimas Atualizações Musicais</h2>
            <div id="musicasRecentesRow" class="musicas-feed-container">
                </div>
        </section>

    </main>

    <div id="personaModal" class="modal">
        <div class="modal__content">
            <span class="modal__close" id="closeModal">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

    <script>
        // Efeito de fundo na Navbar ao realizar o scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('nav__black');
            } else {
                nav.classList.remove('nav__black');
            }
        });
    </script>
</body>
</html>
