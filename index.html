<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunoFlix | Personas IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav" id="navbar">
        <div class="nav__logo">SUNOFLIX</div>
        <div class="nav__links">
            </div>
    </nav>

    <header class="hero">
        <video muted class="hero__video" id="heroVideo" poster="">
            <source src="" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
        
        <div class="hero__overlay"></div>
        
        <div class="hero__contents">
            <h1 class="hero__title" id="heroTitle">Carregando...</h1>
            <p class="hero__description" id="heroDesc">
                Preparando a discografia dos seus personas gerados por IA...
            </p>
            <div class="hero__buttons">
                <button class="hero__button" onclick="document.getElementById('personasRow').scrollIntoView({behavior:'smooth'})">
                    Ver Personas
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        
        <section class="row">
            <h2 class="row__title">Meus Personas</h2>
            
            <div class="row__navigation">
                <button class="nav-btn prev" id="prevBtn" aria-label="Anterior">&#10094;</button>
                
                <div class="row__posters" id="personasRow">
                    </div>
                
                <button class="nav-btn next" id="nextBtn" aria-label="Próximo">&#10095;</button>
            </div>
        </section>

    </main>

    <div id="personaModal" class="modal">
        <div class="modal__content">
            <span class="modal__close" id="closeModal">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    
    <script>
        // Pequena lógica de UI para a Navbar mudar de cor no scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('nav__black');
            } else {
                nav.classList.remove('nav__black');
            }
        });
    </script>
</body>
</html>
